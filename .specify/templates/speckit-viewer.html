(function initEditUI() {
  // Only enable when served via HTTP (dev server provides /api/save)
  if (location.protocol !== 'http:' && location.protocol !== 'https:') return;
  if (!MD_PATH) return;
  // No editing for research, data-model, quickstart, checklists, analyze
  if (isResearch || isChecklist) return;
  var _isDataModel = /^#\s+.*[Dd]ata\s*[Mm]odel/.test(_cleaned);
  var _isQuickstart = /^#\s+.*[Qq]uickstart/.test(_cleaned);
  var _isAnalyze = /^#\s+.*[Aa]nalys/.test(_cleaned);
  if (_isDataModel || _isQuickstart || _isAnalyze) return;
  // Only spec, plan, tasks pages get edit buttons
  if (!isSpec && !isPlan && !isTasks) return;

  // Determine which sections are editable based on page type
  function isEditableSection(heading) {
    if (isSpec) {
      if (/user\s+story/i.test(heading)) return true;
      if (/edge\s+cases/i.test(heading)) return true;
      if (/functional\s+requirements/i.test(heading)) return true;
      if (/non.?functional\s+requirements/i.test(heading)) return true;
      if (/success\s+criteria/i.test(heading)) return true;
      if (/assumptions/i.test(heading)) return true;
      if (/key\s+entities/i.test(heading)) return true;
      return false;
    }
    if (isPlan) {
      if (/td-\d+/i.test(heading)) return true;
      if (/architecture/i.test(heading)) return true;
      if (/api\s+design/i.test(heading)) return true;
      return false;
    }
    if (isTasks) {
      // Phase sections and Notes section
      if (/phase\s+\d/i.test(heading)) return true;
      if (/notes/i.test(heading)) return true;
      return false;
    }
    return false;
  }

  // Parse MARKDOWN into sections: array of { heading, level, startLine, endLine }
  var lines = MARKDOWN.split('\n');
  var sections = []; // { level, heading, startLine, endLine (exclusive) }
  for (var i = 0; i < lines.length; i++) {
    var m = lines[i].match(/^(#{2,6})\s+(.+)/);
    if (m) {
      sections.push({ level: m[1].length, heading: m[2].trim(), startLine: i, endLine: lines.length });
    }
  }
  // Compute endLine for each section
  for (var i = 0; i < sections.length; i++) {
    for (var j = i + 1; j < sections.length; j++) {
      if (sections[j].level <= sections[i].level) {
        sections[i].endLine = sections[j].startLine;
        break;
      }
    }
  }

  // Check if any section is editable before enabling the CSS class
  var hasEditable = sections.some(function(s) { return isEditableSection(s.heading); });
  if (!hasEditable) return;

  // Enable edit buttons via CSS class
  document.body.classList.add('edit-enabled');

  // Add edit buttons only to editable section summaries
  var allDetails = document.querySelectorAll('details.sec-h2, details.sec-h3, details.sec-h4');
  var sectionIdx = 0;

  for (var di = 0; di < allDetails.length; di++) {
    var det = allDetails[di];
    var summary = det.querySelector(':scope > summary');
    if (!summary) continue;
    var headingEl = summary.querySelector('.heading-text');
    if (!headingEl) continue;

    // Match this DOM section to a parsed section by heading text similarity
    var headingText = headingEl.textContent.trim()
      .replace(/^\d+\s*/, '') // remove section number prefix
      .replace(/\s*Review required$/, '').replace(/\s*✓ Reviewed$/, '') // remove review tag text
      .replace(/\s*P[1-4]$/, '') // remove priority badge text
      .replace(/\s*\bUS-?\d+\b/g, '') // remove injected [USx] tag text
      .replace(/\s*\bParallel\b/g, '') // remove injected [P] tag text
      .replace(/\s+/g, ' ').trim(); // normalize whitespace

    var matchIdx = -1;
    for (var si = sectionIdx; si < sections.length; si++) {
      var secHeading = sections[si].heading
        .replace(/\s*\(mandatory\)/gi, '')
        .replace(/\s*\(Priority:\s*P[1-4]\)/gi, '')
        .trim();
      if (secHeading === headingText || secHeading.indexOf(headingText) >= 0 || headingText.indexOf(secHeading) >= 0) {
        matchIdx = si;
        sectionIdx = si + 1;
        break;
      }
    }

    if (matchIdx < 0) continue;
    // Skip non-editable sections
    if (!isEditableSection(sections[matchIdx].heading)) continue;

    var btn = document.createElement('button');
    btn.className = 'edit-btn';
    btn.innerHTML = '&#9998; Edit';
    btn.setAttribute('data-section-idx', String(matchIdx));
    btn.onclick = function(e) {
      e.stopPropagation();
      e.preventDefault();
      openSectionEditor(parseInt(this.getAttribute('data-section-idx'), 10));
    };
    // Insert before chevron (last element in summary)
    var chevron = summary.querySelector('.chevron');
    if (chevron) {
      summary.insertBefore(btn, chevron);
    } else {
      summary.appendChild(btn);
    }
  }

  // --- "(+) Add" buttons for spec/plan/tasks pages ---
  function findDomForSection(targetSecIdx) {
    var allDets = document.querySelectorAll('details.sec-h2, details.sec-h3, details.sec-h4');
    var domSi = 0;
    for (var di = 0; di < allDets.length; di++) {
      var hEl = allDets[di].querySelector(':scope > summary .heading-text');
      if (!hEl) continue;
      var ht = hEl.textContent.trim().replace(/^\d+\s*/, '')
        .replace(/\s*Review required$/, '').replace(/\s*✓ Reviewed$/, '')
        .replace(/\s*P[1-4]$/, '').replace(/\s*\bUS-?\d+\b/g, '')
        .replace(/\s*\bParallel\b/g, '').replace(/\s+/g, ' ').trim();
      for (var sj = domSi; sj < sections.length; sj++) {
        var sh = sections[sj].heading.replace(/\s*\(mandatory\)/gi, '')
          .replace(/\s*\(Priority:\s*P[1-4]\)/gi, '').trim();
        if (sh === ht || sh.indexOf(ht) >= 0 || ht.indexOf(sh) >= 0) {
          if (sj === targetSecIdx) return allDets[di];
          domSi = sj + 1;
          break;
        }
      }
    }
    return null;
  }

  function insertAddButton(label, sectionPattern, buildTemplate) {
    var lastIdx = -1;
    for (var si = 0; si < sections.length; si++) {
      if (sectionPattern.test(sections[si].heading)) lastIdx = si;
    }
    if (lastIdx < 0) return;
    var insertBeforeIdx = lastIdx + 1;

    // Find the last matching section's DOM element and insert button after it
    var lastMatchDom = findDomForSection(lastIdx);
    var addBtn = document.createElement('button');
    addBtn.className = 'add-section-btn';
    addBtn.textContent = label;
    addBtn.onclick = function() {
      var count = 0;
      for (var k = 0; k < sections.length; k++) {
        if (sectionPattern.test(sections[k].heading)) count++;
      }
      var tmpl = buildTemplate(count + 1);
      openInsertEditor(insertBeforeIdx, tmpl.title, tmpl.text);
    };
    if (lastMatchDom && lastMatchDom.nextSibling) {
      lastMatchDom.parentNode.insertBefore(addBtn, lastMatchDom.nextSibling);
    } else if (lastMatchDom) {
      lastMatchDom.parentNode.appendChild(addBtn);
    } else {
      document.getElementById('content').appendChild(addBtn);
    }
  }

  function attachAddButtons() {
    // Remove existing add buttons
    [].forEach.call(document.querySelectorAll('.add-section-btn'), function(el) { el.parentNode.removeChild(el); });

    if (isSpec) {
      insertAddButton('(+) Add User Story', /user\s+story\s+\d/i, function(n) {
        return { title: 'New User Story ' + n, text:
          '## User Story ' + n + ' - [Brief Title] (Priority: P2)\n\n' +
          '[Describe this user journey in plain language]\n\n' +
          '**Why this priority**: [Explain the value and why it has this priority level]\n\n' +
          '**Independent Test**: [Describe how this can be tested independently]\n\n' +
          '**Acceptance Scenarios**:\n\n' +
          '1. **Given** [initial state], **When** [action], **Then** [expected outcome]\n' +
          '2. **Given** [initial state], **When** [action], **Then** [expected outcome]\n\n' +
          '---' };
      });
    }
    if (isPlan) {
      insertAddButton('(+) Add Technical Decision', /td-\d+/i, function(n) {
        var num = String(n).padStart(3, '0');
        return { title: 'New TD-' + num, text:
          '### TD-' + num + ': [Decision Title]\n\n' +
          '**Context**: [What problem or question does this decision address?]\n\n' +
          '**Decision**: [What was decided and why?]\n\n' +
          '**Alternatives Considered**:\n' +
          '- [Alternative 1]: [Why rejected]\n' +
          '- [Alternative 2]: [Why rejected]\n\n' +
          '**Consequences**: [What are the implications of this decision?]' };
      });
    }
  }
  attachAddButtons();

  function openInsertEditor(insertBeforeSecIdx, title, templateText) {
    openEditorPanel(title, templateText, templateText, function(newText, done) {
      var fullLines = MARKDOWN.split('\n');
      var insertLine = (insertBeforeSecIdx < sections.length) ? sections[insertBeforeSecIdx].startLine : fullLines.length;
      var before = fullLines.slice(0, insertLine);
      var after = fullLines.slice(insertLine);
      var insertLines = ('\n' + newText + '\n').split('\n');
      var reconstructed = before.concat(insertLines).concat(after).join('\n');
      doSave(reconstructed, done);
    });
  }

  // --- Generic editor panel (shared by edit and insert) ---
  function openEditorPanel(title, initialText, originalText, onSave) {
    var overlay = document.createElement('div');
    overlay.className = 'edit-overlay';
    overlay.innerHTML =
      '<div class="edit-panel">' +
        '<div class="edit-header">' +
          '<span class="edit-title">' + esc(title) + '</span>' +
          '<button class="edit-cancel" id="edit-cancel-btn">Cancel</button>' +
          '<button class="edit-save" id="edit-save-btn" disabled>Save</button>' +
        '</div>' +
        '<textarea class="edit-textarea" id="edit-textarea" spellcheck="false"></textarea>' +
        '<div class="edit-status" id="edit-status">Press Ctrl+S / Cmd+S to save</div>' +
      '</div>';

    document.body.appendChild(overlay);
    var textarea = document.getElementById('edit-textarea');
    var saveBtn = document.getElementById('edit-save-btn');
    var statusEl = document.getElementById('edit-status');
    textarea.value = initialText;
    textarea.focus();

    // Track changes: disable Save when content matches original
    function checkDirty() {
      var dirty = textarea.value !== originalText;
      saveBtn.disabled = !dirty;
    }
    textarea.addEventListener('input', checkDirty);

    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeEditor();
    });

    document.getElementById('edit-cancel-btn').onclick = closeEditor;
    saveBtn.onclick = function() { if (!saveBtn.disabled) doSaveAction(); };

    textarea.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        if (!saveBtn.disabled) doSaveAction();
      }
      if (e.key === 'Escape') { e.preventDefault(); closeEditor(); }
      if (e.key === 'Tab') {
        e.preventDefault();
        var start = this.selectionStart, end = this.selectionEnd;
        this.value = this.value.substring(0, start) + '  ' + this.value.substring(end);
        this.selectionStart = this.selectionEnd = start + 2;
      }
    });

    function closeEditor() {
      if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
    }

    function doSaveAction() {
      saveBtn.disabled = true;
      statusEl.innerHTML = '<span class="edit-saving">Saving...</span>';
      onSave(textarea.value, function(ok, errMsg) {
        if (ok) {
          statusEl.innerHTML = '<span class="edit-saved">Saved successfully</span>';
          setTimeout(function() { closeEditor(); showClarifyToast(); }, 600);
        } else {
          statusEl.innerHTML = '<span class="edit-error">' + esc(errMsg) + '</span>';
          saveBtn.disabled = false;
        }
      });
    }
  }

  // --- Editor for existing sections ---
  function openSectionEditor(secIdx) {
    var sec = sections[secIdx];
    if (!sec) return;

    var currentLines = MARKDOWN.split('\n');
    var sectionText = currentLines.slice(sec.startLine, sec.endLine).join('\n');

    openEditorPanel(sec.heading, sectionText, sectionText, function(newText, done) {
      var fullLines = MARKDOWN.split('\n');
      var before = fullLines.slice(0, sec.startLine);
      var after = fullLines.slice(sec.endLine);
      var newLines = newText.split('\n');
      var reconstructed = before.concat(newLines).concat(after).join('\n');
      doSave(reconstructed, done);
    });
  }

  // --- Shared save logic ---
  function doSave(reconstructed, done) {
    // Reverse HTML sanitization applied by md-to-html.sh
    reconstructed = reconstructed
      .replace(/<\u200Bscript/gi, '<script')
      .replace(/<\u200B\/script/gi, '</script')
      .replace(/<\u200Biframe/gi, '<iframe')
      .replace(/<\u200B\/iframe/gi, '</iframe')
      .replace(/javascript\u200B:/gi, 'javascript:');

    _skipNextReload = true;
    fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mdPath: MD_PATH, markdown: reconstructed })
    })
    .then(function(resp) {
      if (!resp.ok) throw new Error('Server returned ' + resp.status);
      return resp.json();
    })
    .then(function(data) {
      if (data.ok) {
        MARKDOWN = reconstructed;
        try {
          _reviewTagId = 0;
          render();
          recomputeSections();
          reattachEditButtons();
          attachAddButtons();
        } catch(renderErr) {
          console.error('[sdd-viewer] Re-render error:', renderErr);
        }
        done(true);
      } else {
        _skipNextReload = false;
        done(false, 'Error: ' + (data.error || 'Unknown'));
      }
    })
    .catch(function(err) {
      _skipNextReload = false;
      done(false, 'Save failed: ' + err.message);
    });
  }

  function showClarifyToast() {
    // Remove existing toast if any
    var existing = document.querySelector('.edit-toast');
    if (existing) existing.parentNode.removeChild(existing);

    var pageLabel = isSpec ? 'spec' : isPlan ? 'plan' : 'tasks';
    var toast = document.createElement('div');
    toast.className = 'edit-toast';
    toast.innerHTML =
      '<span class="toast-icon">&#9888;&#65039;</span>' +
      '<span>Section saved. Run <code>/speckit.clarify</code> to verify consistency across ' + pageLabel + ' artifacts.</span>' +
      '<button class="toast-close" onclick="this.parentNode.parentNode.removeChild(this.parentNode)">&times;</button>';
    document.body.appendChild(toast);
  }

  function recomputeSections() {
    var newLines = MARKDOWN.split('\n');
    sections.length = 0;
    for (var i = 0; i < newLines.length; i++) {
      var m = newLines[i].match(/^(#{2,6})\s+(.+)/);
      if (m) {
        sections.push({ level: m[1].length, heading: m[2].trim(), startLine: i, endLine: newLines.length });
      }
    }
    for (var i = 0; i < sections.length; i++) {
      for (var j = i + 1; j < sections.length; j++) {
        if (sections[j].level <= sections[i].level) {
          sections[i].endLine = sections[j].startLine;
          break;
        }
      }
    }
  }

  function reattachEditButtons() {
    var allDetails = document.querySelectorAll('details.sec-h2, details.sec-h3, details.sec-h4');
    var si = 0;
    for (var di = 0; di < allDetails.length; di++) {
      var det = allDetails[di];
      var summary = det.querySelector(':scope > summary');
      if (!summary) continue;
      var headingEl = summary.querySelector('.heading-text');
      if (!headingEl) continue;
      // Remove existing edit button if any
      var old = summary.querySelector('.edit-btn');
      if (old) old.parentNode.removeChild(old);

      var headingText = headingEl.textContent.trim()
        .replace(/^\d+\s*/, '')
        .replace(/\s*Review required$/, '').replace(/\s*✓ Reviewed$/, '')
        .replace(/\s*P[1-4]$/, '')
        .replace(/\s*\bUS-?\d+\b/g, '')
        .replace(/\s*\bParallel\b/g, '')
        .replace(/\s+/g, ' ').trim();

      var matchIdx = -1;
      for (var j = si; j < sections.length; j++) {
        var secH = sections[j].heading
          .replace(/\s*\(mandatory\)/gi, '')
          .replace(/\s*\(Priority:\s*P[1-4]\)/gi, '')
          .trim();
        if (secH === headingText || secH.indexOf(headingText) >= 0 || headingText.indexOf(secH) >= 0) {
          matchIdx = j;
          si = j + 1;
          break;
        }
      }
      if (matchIdx < 0) continue;
      if (!isEditableSection(sections[matchIdx].heading)) continue;

      var btn = document.createElement('button');
      btn.className = 'edit-btn';
      btn.innerHTML = '&#9998; Edit';
      btn.setAttribute('data-section-idx', String(matchIdx));
      btn.onclick = function(e) {
        e.stopPropagation();
        e.preventDefault();
        openSectionEditor(parseInt(this.getAttribute('data-section-idx'), 10));
      };
      var chevron = summary.querySelector('.chevron');
      if (chevron) summary.insertBefore(btn, chevron);
      else summary.appendChild(btn);
    }
  }

  // Flag to suppress SSE reload when we triggered the save ourselves
  var _skipNextReload = false;

  // --- SSE: listen for reload events ---
  if (typeof EventSource !== 'undefined') {
    var es = new EventSource('/api/events');
    es.onmessage = function(e) {
      try {
        var data = JSON.parse(e.data);
        if (data.type === 'reload' && data.mdPath === MD_PATH) {
          // Skip reload if we triggered the save (toast needs to stay visible)
          if (_skipNextReload) { _skipNextReload = false; return; }
          // Reload the page to pick up regenerated HTML
          location.reload();
        }
      } catch(err) {}
    };
    es.onerror = function() {
      // Silently reconnect (EventSource auto-reconnects)
    };
  }
})();
</script>
