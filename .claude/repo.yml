schemaVersion: 1
name: assets
summary: |-
  Crypto token asset registry — logos, metadata (info.json), and trading-pair tokenlists for ~188 blockchains maintained by the Trust Wallet community.

  Route here for: Token logo additions/updates, info.json validation, blockchain tokenlist (tokenlist.json, tokenlist-extended.json) maintenance, asset validation tooling (Go CLI), DApp metadata.

  Do NOT route here for: Wallet logic, key management, transaction signing, mobile/extension app code, backend API services.

  Consumers: Trust Wallet mobile app (CDN token logos/metadata), external wallet projects, assets-management web app (via the Assets Manager API).

  Ships: Compiled Go binary (bin/assets) with subcommands check / fix / update-auto / add-token / add-tokenlist. Also ships the asset file tree itself (consumed via GitHub raw URLs and CDN).

  Agent routing: To add a token — use make add-token; to validate — make check; to auto-fix — make fix; to update trading pairs — make update-auto. See [guides/add-token.md](knowledge/guides/add-token.md).
